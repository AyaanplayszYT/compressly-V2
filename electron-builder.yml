appId: com.mistix.compressly
productName: Compressly
copyright: "Copyright © 2026 Mistix"

directories:
  output: release-build
  buildResources: build-resources

files:
  - main.js
  - preload.js
  - src/**/*
  - renderer/dist/**/*
  - renderer/public/assets/**/*
  - "!**/*.test.js"

asarUnpack:
  - "node_modules/@imgly/background-removal-node/**/*"
  - "node_modules/onnxruntime-node/**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: renderer/public/assets/icon.ico
  forceCodeSigning: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: renderer/public/assets/icon.ico
  uninstallerIcon: renderer/public/assets/icon.ico
  installerHeaderIcon: renderer/public/assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Compressly

extraResources:
  - from: renderer/public/assets
    to: assets
    filter: ["*.ico", "*.png"]
